  test-container-ops:
    name: Container & Ops Tests
    if: github.event_name != 'pull_request' || github.event.label.name == 'ready-for-ci'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
