name: "Smoke Claude"
on:
  pull_request:
    types:
    - labeled
  # roles: all # Roles processed as role check in pre-activation job
  schedule:
  - cron: "22 */12 * * *"
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: "Agent caller context (used internally by Agentic Workflows)."
        required: false
        type: string
      item_number:
        default: ""
        description: The number of the issue, pull request, or discussion
        required: false
        type: string

permissions: {}

concurrency:
  group: "gh-aw-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}-${{ github.event.label.name || github.run_id }}"

run-name: "Smoke Claude"

