              -exec grep -lEi "$INJECTION_PATTERN" {} \; 2>/dev/null || true
          )
          if [ ${#SUSPICIOUS_FILES[@]} -gt 0 ]; then
            mkdir -p "$QUARANTINE_DIR"
            for f in "${SUSPICIOUS_FILES[@]}"; do
